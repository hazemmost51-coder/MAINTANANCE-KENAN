<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAINTANANCE SYSTEM KENAN ARABIAN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>MAINTANANCE SYSTEM KENAN ARABIAN</h1>
        
        <div class="btn-group">
            <button id="addBtn" class="main-btn"> ADD NEW CASE➕</button>
            <button id="exportBtn" class="export-btn">EXPORT EXCEL📊</button>
        </div>

        <h2>CASES</h2>
        <div id="casesList" class="cards-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle" style="margin-top:0;">INSERT NEW Case</h2>
            <form id="caseForm">
                <input type="hidden" id="editIndex" value="-1">
                <input type="hidden" id="oldTimestamp">

                <div class="form-grid">
                    <div class="field">
                        <label> Technician Name:</label>
                        <select id="technician" required>
                            <option value="">Chose Technician Name ...</option>
                            <option value="AHMED">AHMED</option>
                            <option value="MOHAMED">MOHAMED</option>
                            <option value="ESLAM">ESLAM</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Location:</label>
                        <select id="location" required>
                            <option value="">Chose location ...</option>
                            <option value="Abu arish">Abu arish</option>
                            <option value="Damad">Damad</option>
                        </select>
                    </div>
                </div>

                <div class="item-selection-box">
                    <h3>ADD NEW BAND</h3>
                    <div class="item-grid">
                        <div class="field">
                            <label>Code and description:</label>
                            <select id="itemSelect">
                                <option value="">Chose band ...</option>
                            </select>
                        </div>
                        <button type="button" id="addItemBtn" class="add-item-btn">ADD ➕</button>
                    </div>
                </div>

                <div class="added-items-section">
                    <table>
                        <thead>
                            <tr>
                                <th>Band and description</th>
                                <th>Unit</th>
                                <th>Quantity</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody">
                        </tbody>
                    </table>
                </div>

                <button type="submit" id="saveBtn" class="save-btn"> Save ✔</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
